services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: broker-mq-tugas2
    ports:
      - "1883"    # Internal only, or leave mapped if needed
    networks:
      - simnet
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mosquitto_pub", "-h", "localhost", "-t", "health", "-m", "ping", "-q", "0"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  webapp:
    build: .
    container_name: webapp-sim-tugas2
    ports:
      - "80:8000"  # Mapping port 80 ke 8000
    networks:
      - simnet
    depends_on:
      mosquitto:
        condition: service_healthy
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    restart: unless-stopped
    volumes:
      - ./backend:/app/backend
      - ./frontend:/app/frontend

networks:
  simnet:
    driver: bridge
